name: KMP Multiplatform CI

on: [push]

jobs:
  # Задача 1: Проверка Android-части
  build-android:
    runs-on: ubuntu-latest # Linux для Android собирает быстрее и дешевле
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Компилируем Android-версию
      - name: Build Android Project
        run: ./gradlew assembleDebug

  # Задача 2: Проверка iOS-части
  build-ios:
    runs-on: macos-latest # macOS необходим для iOS-компиляции
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Компилируем Kotlin-код в iOS фреймворк
      - name: Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64
